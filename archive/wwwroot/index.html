<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>أرشيف الكتب</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="app-header">
	<div class="logo">
	  <span class="logo-icon">📚</span>
	  <h1>أرشيف الكتب</h1>
	</div>
	<div class="toolbar">
	  <input type="search" id="searchInput" placeholder="ابحث بالعنوان أو المؤلف..." />
	  <select id="categoryFilter">
		<option value="">كل التصنيفات</option>
	  </select>
	  <button id="addBookBtn" class="btn btn-primary">+ إضافة كتاب</button>
	  <button id="logoutBtn" class="btn btn-secondary">تسجيل الخروج</button>
	</div>
  </header>

  <main>
	<div id="emptyState" class="empty-state hidden">
	  <p>لا توجد كتب مطابقة. ابدأ بإضافة كتاب جديد.</p>
	</div>
	<div id="booksGrid" class="books-grid"></div>
  </main>

  <!-- Modal: Add/Edit book -->
  <div id="bookModal" class="modal-overlay hidden">
	<div class="modal">
	  <div class="modal-header">
		<h2 id="modalTitle">إضافة كتاب</h2>
		<button id="closeModalBtn" class="btn-icon">✕</button>
	  </div>
	  <form id="bookForm">
		<input type="hidden" id="bookId" />
		<div class="form-row">
		  <label>العنوان *</label>
		  <input type="text" id="title" required />
		</div>
		<div class="form-row two-col">
		  <div>
			<label>المؤلف</label>
			<input type="text" id="author" />
		  </div>
		  <div>
			<label>التصنيف</label>
			<input type="text" id="category" list="categoryList" />
			<datalist id="categoryList"></datalist>
		  </div>
		</div>
		<div class="form-row two-col">
		  <div>
			<label>الناشر</label>
			<input type="text" id="publisher" />
		  </div>
		  <div>
			<label>سنة النشر</label>
			<input type="number" id="year" />
		  </div>
		</div>
		<div class="form-row">
		  <label>اللغة</label>
		  <input type="text" id="language" />
		</div>
		<div class="form-row">
		  <label>ملاحظات</label>
		  <textarea id="notes" rows="3"></textarea>
		</div>
		<div class="form-row two-col">
		  <div>
			<label>صورة الغلاف</label>
			<button type="button" id="pickCoverBtn" class="btn btn-secondary">اختيار صورة</button>
			<span id="coverFileName" class="file-name"></span>
		  </div>
		  <div>
			<label>ملف الكتاب</label>
			<button type="button" id="pickFileBtn" class="btn btn-secondary">اختيار ملف</button>
			<span id="bookFileName" class="file-name"></span>
		  </div>
		</div>
		<div class="modal-actions">
		  <button type="button" id="cancelBtn" class="btn btn-secondary">إلغاء</button>
		  <button type="submit" class="btn btn-primary">حفظ</button>
		</div>
	  </form>
	</div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
