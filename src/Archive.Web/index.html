<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>أرشيف الكتب</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="app-header">
    <div class="logo">
      <span class="logo-icon">📚</span>
      <h1>أرشيف الكتب</h1>
    </div>
    <div class="toolbar">
      <input type="search" id="searchInput" placeholder="ابحث بالعنوان أو المؤلف..." />
      <select id="categoryFilter">
        <option value="">كل التصنيفات</option>
      </select>
      <button id="addBookBtn" class="btn btn-primary">+ إضافة كتاب</button>
      <span id="userLabel" style="font-size:13px;opacity:.9"></span>
      <button id="logoutBtn" class="btn btn-secondary">تسجيل الخروج</button>
    </div>
  </header>

  <main>
    <div id="emptyState" class="empty-state hidden">
      <p>لا توجد كتب مطابقة. ابدأ بإضافة كتاب جديد.</p>
    </div>
    <div id="booksGrid" class="books-grid"></div>
  </main>

  <div id="bookModal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">إضافة كتاب</h2>
        <button id="closeModalBtn" class="btn-icon" type="button">✕</button>
      </div>
      <form id="bookForm">
        <input type="hidden" id="bookId" />
        <div class="form-row">
          <label>العنوان *</label>
          <input type="text" id="title" required />
        </div>
        <div class="form-row two-col">
          <div>
            <label>المؤلف</label>
            <input type="text" id="author" />
          </div>
          <div>
            <label>التصنيف</label>
            <input type="text" id="category" list="categoryList" />
            <datalist id="categoryList"></datalist>
          </div>
        </div>
        <div class="form-row two-col">
          <div>
            <label>الناشر</label>
            <input type="text" id="publisher" />
          </div>
          <div>
            <label>سنة النشر</label>
            <input type="number" id="year" />
          </div>
        </div>
        <div class="form-row">
          <label>اللغة</label>
          <input type="text" id="language" />
        </div>
        <div class="form-row">
          <label>ملاحظات</label>
          <textarea id="notes" rows="3"></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" id="cancelBtn" class="btn btn-secondary">إلغاء</button>
          <button type="submit" class="btn btn-primary">حفظ</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
