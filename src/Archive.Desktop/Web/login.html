<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>تسجيل الدخول - أرشيف الكتب</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/login.css" />
</head>
<body class="login-body">
  <div class="login-wrapper">
	<div class="login-card">
	  <div class="login-logo">
		<span class="logo-icon">📚</span>
		<h1>أرشيف الكتب</h1>
	  </div>
	  <p id="loginSubtitle" class="login-subtitle">تسجيل الدخول للمتابعة</p>

	  <form id="loginForm">
		<div class="form-row">
		  <label>اسم المستخدم</label>
		  <input type="text" id="username" autocomplete="username" required />
		</div>
		<div class="form-row">
		  <label>كلمة المرور</label>
		  <input type="password" id="password" autocomplete="current-password" required />
		</div>
		<div id="confirmPasswordRow" class="form-row hidden">
		  <label>تأكيد كلمة المرور</label>
		  <input type="password" id="confirmPassword" autocomplete="new-password" />
		</div>

		<p id="errorMessage" class="error-message hidden"></p>

		<button type="submit" id="submitBtn" class="btn btn-primary login-btn">دخول</button>
	  </form>

	  <p id="setupHint" class="setup-hint hidden">لا يوجد حساب مسجل بعد، سيتم إنشاء أول حساب كمسؤول للنظام.</p>
	</div>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
